console_title_template = '{{ .Shell }} in {{ .Folder }}'
version = 4
final_space = true

[palette]
  black = 'black'
  blue = 'blue'
  cyan = 'cyan'
  green = 'green'
  orange = 'lightYellow'
  red = 'red'
  white = 'white'
  yellow = 'yellow'

[secondary_prompt]
  template = '<,p:black> > </><p:black,transparent></> '
  foreground = 'p:black'
  background = 'transparent'

[transient_prompt]
  template = '<,p:cyan> {{ .Folder }} </><p:cyan,transparent></> '
  foreground = 'p:black'
  background = 'transparent'

[upgrade]
  source = 'cdn'
  interval = '168h'
  auto = false
  notice = false

[[blocks]]
  type = 'prompt'
  alignment = 'left'

  [[blocks.segments]]
    leading_diamond = ''
    trailing_diamond = ''
    template = ' ✘ {{ .Code }} '
    foreground = 'p:red'
    background = 'p:black'
    type = 'status'
    style = 'diamond'

    [blocks.segments.options]
      always_enabled = false

  [[blocks.segments]]
    leading_diamond = ''
    trailing_diamond = ''
    template = ' {{ if .SSHSession }} {{ .UserName }} {{ end }}'
    foreground = 'p:white'
    background = 'p:black'
    type = 'session'
    style = 'diamond'

  [[blocks.segments]]
    leading_diamond = ''
    trailing_diamond = ''
    template = '  {{ path .Path .Location }} '
    foreground = 'p:black'
    background = 'p:cyan'
    type = 'path'
    style = 'diamond'

    [blocks.segments.options]
      style = 'folder'

  [[blocks.segments]]
    leading_diamond = ''
    trailing_diamond = ''
    template = ' {{ if .UpstreamURL }}{{ url .UpstreamIcon .UpstreamURL }} {{ end }}{{ .HEAD }}{{if .BranchStatus }} {{ .BranchStatus }}{{ end }}{{ if .Working.Changed }}  {{ .Working.String }}{{ end }}{{ if .Staging.Changed }}  {{ .Staging.String }}{{ end }} '
    foreground = 'p:black'
    background = 'p:green'
    type = 'git'
    style = 'diamond'
    background_templates = ['{{ if or (.Working.Changed) (.Staging.Changed) }}p:yellow{{ end }}', '{{ if and (gt .Ahead 0) (gt .Behind 0) }}p:red{{ end }}', '{{ if gt .Ahead 0 }}blue{{ end }}', '{{ if gt .Behind 0 }}magenta{{ end }}']
    foreground_templates = ['{{ if or (.Working.Changed) (.Staging.Changed) }}p:black{{ end }}', '{{ if and (gt .Ahead 0) (gt .Behind 0) }}p:white{{ end }}', '{{ if gt .Ahead 0 }}p:white{{ end }}']

    [blocks.segments.options]
      branch_template = '{{ trunc 25 .Branch }}'
      fetch_status = true
      fetch_upstream_icon = true

  [[blocks.segments]]
    leading_diamond = ''
    trailing_diamond = ''
    template = '  '
    foreground = 'p:white'
    background = 'p:yellow'
    type = 'root'
    style = 'diamond'


